name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: llm-mem-mcp

jobs:
  # ─── Build matrix with NATIVE targets only ───────────────────────────
  build:
    name: Build ${{ matrix.target }} (native)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (native) ─────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: llm-mem-mcp-linux-x86_64
            rust_toolchain: stable

          # ── Linux aarch64 (native on ARM64 runner) ────────────────────
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: llm-mem-mcp-linux-aarch64
            rust_toolchain: stable

          # ── macOS x86_64 (native on Intel Mac) ────────────────────────
          - target: x86_64-apple-darwin
            os: macos-13-large
            artifact: llm-mem-mcp-macos-x86_64
            rust_toolchain: stable

          # ── macOS Apple Silicon (native on M1 Mac) ────────────────────
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: llm-mem-mcp-macos-aarch64
            rust_toolchain: stable

          # ── Windows x86_64 (native) ───────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            artifact: llm-mem-mcp-windows-x86_64
            rust_toolchain: stable

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/${{ matrix.target }}/release
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-release-
            ${{ runner.os }}-${{ matrix.target }}-

      # ── Linux native deps ────────────────────────────────────────────
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            clang \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            libclang-dev \
            libonnx-dev \
            glslc
          # Verify clang is available for bindgen
          clang --version
          # Verify glslc is available for Vulkan shader compilation
          glslc --version

      # ── macOS native deps ────────────────────────────────────────────
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          # Xcode Command Line Tools provide clang, cmake, etc.
          # Just ensure cmake is up to date
          brew install cmake ninja
          clang --version

      # ── Windows native deps ──────────────────────────────────────────
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: |
          # Install LLVM (provides clang for bindgen)
          choco install -y llvm cmake ninja pkgconfiglite openssl
          # Verify clang is in PATH
          & "C:\Program Files\LLVM\bin\clang.exe" --version
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV

      # ── Windows Vulkan SDK ───────────────────────────────────────────
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          # Download and install Vulkan SDK (silent install)
          $ProgressPreference = 'SilentlyContinue'
          $vulkanInstaller = "vulkan-sdk.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe" -OutFile $vulkanInstaller
          Start-Process -FilePath $vulkanInstaller -ArgumentList "/S" -Wait
          Remove-Item $vulkanInstaller
          # Set VULKAN_SDK environment variable
          $vulkanPath = "C:\VulkanSDK\*"
          $vulkanVersion = Get-ChildItem $vulkanPath | Select-Object -First 1 -ExpandProperty Name
          echo "VULKAN_SDK=C:\VulkanSDK\$vulkanVersion" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$vulkanVersion\Bin" >> $env:GITHUB_PATH
          # Verify glslc is available
          & "C:\VulkanSDK\$vulkanVersion\Bin\glslc.exe" --version

      # ── Build ────────────────────────────────────────────────────────
      - name: Build release binary
        shell: bash
        run: |
          # Determine features based on platform
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows: enable vulkan with Vulkan SDK installed
            FEATURES="local,vulkan"
            NO_DEFAULT=""
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            # Linux (x86_64 + ARM64): enable vulkan for GPU acceleration
            FEATURES="local,vulkan"
            NO_DEFAULT=""
          else
            # macOS: Metal is auto-detected, no vulkan feature needed
            FEATURES="local"
            NO_DEFAULT=""
          fi

          echo "Building with features: $FEATURES"

          # Build with all features enabled (native compilation)
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --bin ${{ env.BINARY_NAME }} \
            $NO_DEFAULT \
            --features "$FEATURES"

      # ── Run clippy on native build ───────────────────────────────────
      - name: Run clippy (release mode)
        shell: bash
        run: |
          # Determine features based on platform (same logic as build)
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows: enable vulkan with Vulkan SDK installed
            FEATURES="local,vulkan"
            NO_DEFAULT=""
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            # Linux (x86_64 + ARM64): enable vulkan for GPU acceleration
            FEATURES="local,vulkan"
            NO_DEFAULT=""
          else
            # macOS: Metal is auto-detected, no vulkan feature needed
            FEATURES="local"
            NO_DEFAULT=""
          fi

          cargo clippy \
            --release \
            --target ${{ matrix.target }} \
            --bin ${{ env.BINARY_NAME }} \
            $NO_DEFAULT \
            --features "$FEATURES" \
            -- -D warnings

      # ── Package ──────────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          strip ${{ env.BINARY_NAME }} 2>/dev/null || true
          tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ env.BINARY_NAME }}
          cd ../../..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ env.BINARY_NAME }}.exe -DestinationPath ../../../${{ matrix.artifact }}.zip -Force
          cd ../../..
          $hash = Get-FileHash -Path ${{ matrix.artifact }}.zip -Algorithm SHA256
          "$($hash.Hash) ${{ matrix.artifact }}.zip" > ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.${{ runner.os == 'Windows' && 'zip' || 'tar.gz' }}
            ${{ matrix.artifact }}.${{ runner.os == 'Windows' && 'zip' || 'tar.gz' }}.sha256
          if-no-files-found: error

  # ─── Create GitHub Release ───────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.zip' \) \
            -exec mv {} release-files/ \;
          echo "── Release files ──"
          ls -lh release-files/

      - name: Generate release notes
        id: notes
        run: |
          cat > release-files/RELEASE_NOTES.md << 'NOTES_EOF'
          ## llm-mem Release

          Standalone MCP memory server with embedded vector store for AI agents.

          ### Installation

          Download the archive for your platform, extract, and run:

          ```bash
          # Linux/macOS
          tar xzf llm-mem-mcp-<platform>.tar.gz
          ./llm-mem-mcp --help

          # Windows
          Expand-Archive llm-mem-mcp-windows-x86_64.zip
          .\llm-mem-mcp.exe --help
          ```

          ### Platforms (Native Builds)

          | Archive | Platform | Architecture | Vulkan GPU |
          |---------|----------|--------------|------------|
          | `llm-mem-mcp-linux-x86_64.tar.gz` | Linux (Ubuntu 24.04+) | x86_64 | ✅ Vulkan |
          | `llm-mem-mcp-linux-aarch64.tar.gz` | Linux ARM64 | aarch64 | ✅ Vulkan |
          | `llm-mem-mcp-macos-x86_64.tar.gz` | macOS 13+ (Intel) | x86_64 | ✅ Metal |
          | `llm-mem-mcp-macos-aarch64.tar.gz` | macOS 14+ (Apple Silicon) | ARM64 | ✅ Metal |
          | `llm-mem-mcp-windows-x86_64.zip` | Windows 10/11 | x86_64 | ✅ Vulkan |

          **Notes:**
          - GPU acceleration: Vulkan on Linux/Windows, Metal on macOS
          - On first run, models are auto-downloaded from Hugging Face (~1 GB)

          ### Verify download

          ```bash
          # Linux/macOS
          sha256sum -c llm-mem-mcp-<platform>.tar.gz.sha256

          # Windows (PowerShell)
          Get-FileHash llm-mem-mcp-<platform>.zip -Algorithm SHA256
          ```

          ### Configuration

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full configuration.

          ### Features

          - **local**: Local LLM inference via llama.cpp (GGUF models)
          - **vulkan**: GPU acceleration via Vulkan (Linux/Windows) or Metal (macOS)
          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: release-files/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Smoke tests on native platforms ─────────────────────────────────
  smoke-test:
    name: Smoke test ${{ matrix.artifact }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: llm-mem-mcp-linux-x86_64
            os: ubuntu-24.04
          - artifact: llm-mem-mcp-linux-aarch64
            os: ubuntu-24.04-arm
          - artifact: llm-mem-mcp-macos-x86_64
            os: macos-13-large
          - artifact: llm-mem-mcp-macos-aarch64
            os: macos-14
          - artifact: llm-mem-mcp-windows-x86_64
            os: windows-2022
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Extract and test (Unix)
        if: runner.os != 'Windows'
        run: |
          tar xzf ${{ matrix.artifact }}.tar.gz
          chmod +x llm-mem-mcp
          ./llm-mem-mcp --version
          ./llm-mem-mcp --help
          echo "✓ Smoke test passed for ${{ matrix.artifact }}"

      - name: Extract and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Expand-Archive -Path ${{ matrix.artifact }}.zip -DestinationPath .
          .\llm-mem-mcp.exe --version
          .\llm-mem-mcp.exe --help
          echo "✓ Smoke test passed for ${{ matrix.artifact }}"

  # ─── Integration tests (Linux x86_64 only) ───────────────────────────
  integration-test:
    name: Integration tests
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            clang \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            libclang-dev

      - name: Run cargo test
        run: |
          cargo test --release --features local -- --test-threads=1

      - name: Run cargo fmt check
        run: cargo fmt --all --check

      - name: Run cargo clippy
        run: |
          cargo clippy --features local,vulkan -- -D warnings
