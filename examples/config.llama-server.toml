# LLM Memory MCP Server - llama-server + Local Embeddings
#
# Uses llama-server for LLM queries and local fastembed for embeddings.
# No external API keys needed.
#
# Setup:
# 1. Install llama-server: https://github.com/ggerganov/llama.cpp
# 2. Start it: llama-server -m /path/to/model.gguf --port 8080
# 3. Run: llm-mem-mcp --config config.llama-server.toml

# ── LLM (llama-server API) ──────────────────────────────────────────────────
[llm]
provider = "api"
api_url = "http://localhost:8080"
api_key = "NONE"
model = "default"
temperature = 0.7
max_tokens = 2048
context_size = 8192
use_structured_output = true
structured_output_retries = 2
strip_tags = ["think", "reason", "thought"]
use_grammar = false

# ── Embedding (local fastembed) ──────────────────────────────────────────────
[embedding]
provider = "local"
model = "all-MiniLM-L6-v2"

# ── Vector Store ─────────────────────────────────────────────────────────────
[vector_store]
store_type = "vectorlite"
collection_name = "llm-memories"
banks_dir = "llm-mem-data/banks"

[vector_store.vectorlite]
index_type = "hnsw"
metric = "cosine"

# ── Memory ────────────────────────────────────────────────────────────────────
[memory]
max_memories = 10000
similarity_threshold = 0.65
max_search_results = 50
auto_summary_threshold = 32768
auto_enhance = true
deduplicate = true
merge_threshold = 0.75
search_similarity_threshold = 0.35
max_content_length = 32768
document_chunk_size = 4000

# ── Server ────────────────────────────────────────────────────────────────────
[server]
host = "0.0.0.0"
port = 8000

# ── Logging Configuration ───────────────────────────────────────────────────
[logging]
enabled = false
log_directory = "llm-mem-data/logs"
level = "info"
max_size_mb = 1
max_files = 5
